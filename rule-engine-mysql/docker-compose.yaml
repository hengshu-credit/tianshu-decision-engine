services:
  mysql: # 服务名称
    image: mysql:8.4.6 # 或其它mysql版本
    restart: always # 容器随docker启动自启
    container_name: mysql
    privileged: true
    environment:
      - "MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}"
      - MYSQL_ROOT_HOST=%
      - MYSQL_DATABASE=rule_engine
      - "MYSQL_USER=${MYSQL_USERNAME:?Set MYSQL_USERNAME in .env}"
      - "MYSQL_PASSWORD=${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}"
    volumes:
      - ./logs:/var/log/mysql # 映射日志目录，宿主机:容器
      - ./data:/var/lib/mysql # 映射数据目录，宿主机:容器
      - ./conf.d:/etc/mysql/conf.d # 映射配置目录，宿主机:容器
      - /etc/localtime:/etc/localtime:ro # 让容器的时钟与宿主机时钟同步，避免时间的问题，ro是read only的意思，就是只读。
      - ../rule-engine-server/src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../rule-engine-server/src/main/resources/sql/export_202607161151.sql:/docker-entrypoint-initdb.d/02-export.sql:ro
    ports:
      - 3306:3306 # 指定宿主机端口与容器端口映射关系，宿主机:容器
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 60s
