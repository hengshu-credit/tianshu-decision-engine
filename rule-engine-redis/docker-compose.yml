# version: '3.3'
services:
  redis:
    image: redis:8.2.1
    container_name: redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - ./data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - ./logs:/logs
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli -a 1qaz@WSX ping | grep PONG || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
